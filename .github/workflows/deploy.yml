name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Спеціальні права, які потрібні саме для деплою на Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Якщо одночасно запущено кілька деплоїв — скасовуємо попередній
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # Vite збере проєкт у папку ./dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"   # завантажуємо папку dist як артефакт для Pages

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build    # чекаємо поки job build завершиться
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4