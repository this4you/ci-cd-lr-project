name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["CI - Code Verification"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

# Дозволяє запустити лише один деплой одночасно
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # Деплоїмо лише після успішного проходження CI та пушу в main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Крок 1: Клонуємо репозиторій
      - name: Checkout repository
        uses: actions/checkout@v4

      # Крок 2: Встановлюємо Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Крок 3: Встановлюємо залежності
      - name: Install dependencies
        run: npm ci

      # Крок 4: Збираємо проект (білдимо)
      - name: Build project
        run: npm run build

      # Крок 5: Налаштовуємо GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Крок 6: Завантажуємо артефакт для деплою (папка dist для Vite)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # Крок 7: Виконуємо деплой на GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
