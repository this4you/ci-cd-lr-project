# release.yml — Автоматичний реліз після merge у main
# Запускається: коли PR закривається (merged) у гілку main
# Виконує: створення тегу, GitHub Release, оновлення README, коментар з жартом

name: Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed  # спрацьовує при закритті PR (нас цікавить тільки merged)

jobs:
  release:
    # Умовний запуск: тільки якщо PR справді злитий (merged), не просто закритий
    if: github.event.pull_request.merged == true
    name: Create Release & Update README
    runs-on: ubuntu-latest

    # Дозволи: потрібні для запису в репозиторій та створення релізів
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Потрібен токен з правами на push (щоб оновлювати README)
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Завантажуємо всю історію для роботи з тегами

      # Крок: Визначаємо версію релізу
      # Версія формується як: v1.0.<номер запуску workflow>
      # github.run_number — унікальний лічильник запусків у репозиторії
      - name: Determine version
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"

      # Крок: Отримуємо жарт з Chuck Norris API
      # Жарт підтягується динамічно — не захардкоджений!
      - name: Fetch Chuck Norris joke
        id: joke
        run: |
          # Робимо запит до зовнішнього API
          JOKE=$(curl -s https://api.chucknorris.io/jokes/random | jq -r '.value')
          echo "joke=$JOKE" >> $GITHUB_OUTPUT
          echo "Fetched joke: $JOKE"

      # Крок: Зчитуємо назву PR з event payload
      # github.event.pull_request.title — назва PR, яку ввів розробник
      - name: Get PR title
        id: pr
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "title=$PR_TITLE" >> $GITHUB_OUTPUT

      # Крок: Оновлюємо README.md
      # Знаходимо блок "## Latest Release Info" і замінюємо його актуальними даними
      - name: Update README.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PR_TITLE="${{ steps.pr.outputs.title }}"
          JOKE="${{ steps.joke.outputs.joke }}"

          # Формуємо новий блок з інформацією про реліз
          RELEASE_BLOCK="## Latest Release Info
          - Version: $VERSION
          - PR Title: $PR_TITLE
          - Chuck Norris Joke: $JOKE"

          # Якщо блок вже існує — замінюємо його; якщо ні — додаємо в кінець
          if grep -q "## Latest Release Info" README.md; then
            # Видаляємо старий блок (від заголовку до наступного ## або кінця файлу)
            python3 -c "
          import re, sys
          content = open('README.md').read()
          new_block = '''$RELEASE_BLOCK'''
          # Замінюємо блок між '## Latest Release Info' і наступним '##' або кінцем
          pattern = r'## Latest Release Info.*?(?=\n## |\Z)'
          result = re.sub(pattern, new_block.strip(), content, flags=re.DOTALL)
          open('README.md', 'w').write(result)
          "
          else
            # Додаємо блок в кінець README
            echo "" >> README.md
            echo "$RELEASE_BLOCK" >> README.md
          fi

          echo "README.md updated successfully"
          cat README.md

      # Крок: Комітимо оновлений README
      # ВАЖЛИВО: commit message "[skip ci]" не запускає CI знову — уникаємо петлі
      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update release info to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      # Крок: Створюємо git tag
      # Tag — це мітка на конкретний коміт у git
      - name: Create git tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag $VERSION
          git push origin $VERSION
          echo "Tag $VERSION created and pushed"

      # Крок: Створюємо GitHub Release
      # GitHub Release — це вже UI-об'єкт у вкладці "Releases" репозиторію
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 🚀 Release ${{ steps.version.outputs.version }}

            **Merged PR:** ${{ steps.pr.outputs.title }}

            **Chuck Norris says:**
            > ${{ steps.joke.outputs.joke }}

            ---
            *Auto-generated by GitHub Actions*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Крок: Додаємо коментар з жартом до PR
      - name: Comment joke on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🤖 Release ${{ steps.version.outputs.version }} created!\n\n**Chuck Norris says:**\n> ${{ steps.joke.outputs.joke }}`
            })
