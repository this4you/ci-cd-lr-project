name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.version.outputs.VERSION }}
          git push origin ${{ steps.version.outputs.VERSION }}

      - name: Get PR title
        id: pr
        run: echo "PR_TITLE=${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT

      - name: Get Chuck Norris joke
        id: joke
        run: |
          JOKE=$(curl -s https://api.chucknorris.io/jokes/random | jq -r '.value')
          echo "JOKE=$JOKE" >> $GITHUB_OUTPUT

          - name: Comment joke on PR
        uses: peter-evans/create-or-update-comment@v4
         with:
               issue-number: ${{ github.event.pull_request.number }}
         body: ${{ steps.joke.outputs.JOKE }}

      - name: Update README
        run: |
          echo "## Latest Release Info" > temp.md
          echo "- Version: ${{ steps.version.outputs.VERSION }}" >> temp.md
          echo "- PR Title: ${{ steps.pr.outputs.PR_TITLE }}" >> temp.md
          echo "- Chuck Norris Joke: ${{ steps.joke.outputs.JOKE }}" >> temp.md
          cat README.md >> temp.md
          mv temp.md README.md

      - name: Commit README
        run: |
          git add README.md
          git commit -m "Update README with release info"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          body: |
            ${{ steps.joke.outputs.JOKE }}