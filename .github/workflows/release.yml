name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Get Chuck Norris joke
        id: joke
        run: |
          JOKE=$(curl -s https://api.chucknorris.io/jokes/random | jq -r '.value')
          echo "JOKE=$JOKE" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          JOKE="${{ steps.joke.outputs.JOKE }}"
          echo -e "## Latest Release Info\n- Version: $VERSION\n- Chuck Norris Joke: $JOKE\n\n$(cat README.md)" > README.md
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "docs: update README with release info [skip ci]"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ### 🥊 Chuck Norris Joke of the Day
            ${{ steps.joke.outputs.JOKE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
