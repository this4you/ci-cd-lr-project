name: Release and Update README

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get Joke from API
        id: chuck_joke
        run: |
          # Використовуємо curl для отримання жарту
          JOKE=$(curl -s https://api.chucknorris.io/jokes/random | jq -r '.value')
          echo "joke=$JOKE" >> $GITHUB_OUTPUT

      - name: Create Release and Tag
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.${{ github.run_number }}
          release_name: Release v1.0.${{ github.run_number }}
          body: |
            ${{ steps.chuck_joke.outputs.joke }}
            
            PR Title: ${{ github.event.pull_request.title }}

      - name: Update README
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          JOKE="${{ steps.chuck_joke.outputs.joke }}"
          
          # Оновлюємо блок у README (використовуємо sed або просто додаємо в кінець)
          echo -e "\n## Latest Release Info\n- **Version:** $VERSION\n- **PR Title:** $PR_TITLE\n- **Chuck Norris Joke:** $JOKE" >> README.md
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README with release info [skip ci]"
          git push
