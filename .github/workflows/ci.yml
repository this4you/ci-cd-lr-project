name: CI - Code Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Крок 1: Клонуємо репозиторій
      - name: Checkout repository
        uses: actions/checkout@v4

      # Крок 2: Встановлюємо Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Крок 3: Встановлюємо залежності
      - name: Install dependencies
        run: npm ci

      # Крок 4: Запускаємо лінтер
      - name: Run lint
        run: npm run lint

      # Крок 5: Запускаємо тести (використовуємо --run для vitest, щоб він завершився після виконання)
      - name: Run tests
        run: npm test -- --run

      # Крок 6: Перевіряємо білд проекту
      - name: Run build
        run: npm run build
