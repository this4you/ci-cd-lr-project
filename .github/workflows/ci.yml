# ci.yml — Перевірка якості коду
# Запускається на: push (будь-яка гілка) та pull_request
# Якщо lint, test або build падають — workflow завершується зі статусом "failed"

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality-check:
    name: Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      # Крок 1: Отримуємо код репозиторію
      - name: Checkout repository
        uses: actions/checkout@v4

      # Крок 2: Встановлюємо Node.js (версія з .nvmrc або фіксована)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Кешуємо node_modules — прискорює наступні запуски
          cache: "npm"

      # Крок 3: Встановлюємо залежності
      - name: Install dependencies
        run: npm ci

      # Крок 4: Запускаємо ESLint
      # Якщо є помилки — step завершиться з exit code != 0,
      # і весь workflow отримає статус "failed"
      - name: Run lint
        run: npm run lint

      # Крок 5: Запускаємо тести
      # Те саме — помилка тесту = failed pipeline
      - name: Run tests
        run: npm test -- --run

      # Крок 6: Будуємо проєкт
      # Перевіряємо, що проєкт компілюється без помилок
      - name: Build project
        run: npm run build
